<section class="search-bar">
  <form (submit)="$event.preventDefault()">
    <input type="text" placeholder="Filtrar por ciudad" #filter (input)="filterResults(filter.value)">
    <button class="primary" type="button" (click)="filterResults(filter.value)">Buscar</button>
  </form>
</section>

<section class="results">
  <ng-container *ngIf="filteredLocationList().length > 0; else noResults">
    <app-housing-location
      *ngFor="let housingLocation of filteredLocationList()"
      [housingLocation]="housingLocation">
    </app-housing-location>
  </ng-container>
  <ng-template #noResults>
    <p class="no-results">No se encontraron viviendas para esa ciudad.</p>
  </ng-template>
</section>
