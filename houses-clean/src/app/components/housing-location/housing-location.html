<section class="listing" [class.unavailable]="!housingLocation.available">
  <div class="photo-container">
    <img
      class="listing-photo"
      [src]="housingLocation.photo || 'https://placehold.co/600x400?text=Sin+Foto'"
      alt="Foto exterior de {{housingLocation.name}}"
    >
    <span class="badge-price">{{ housingLocation.price | currency:'USD':'symbol':'1.0-0' }}</span>
    <span class="badge-status" [class.available]="housingLocation.available" [class.sold]="!housingLocation.available">
      {{ housingLocation.available ? '✅ Disponible' : '❌ No disponible' }}
    </span>
  </div>

  <h2 class="listing-heading">{{ housingLocation.name }}</h2>
  <p class="listing-location">{{ housingLocation.city }}, {{ housingLocation.state }}</p>

  <a [routerLink]="['/details', housingLocation.id]" class="learn-more">
    Ver más detalles ›
  </a>
</section>
