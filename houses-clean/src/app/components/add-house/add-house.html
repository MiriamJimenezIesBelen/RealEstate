<div class="container mt-5">
  <h2 class="mb-4">Añadir nueva vivienda</h2>

  <div *ngIf="successMsg" class="alert alert-success">
    {{ successMsg }}
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger">
    {{ errorMsg }}
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-group">
      <label class="form-label">Nombre / Título *</label>
      <input type="text" class="form-control" formControlName="name">
      <div class="error-msg" *ngIf="form.controls.name.touched && form.controls.name.invalid">
        El nombre es obligatorio (Mínimo 3 caracteres).
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Ciudad *</label>
        <input type="text" class="form-control" formControlName="city">
        <div class="error-msg" *ngIf="form.controls.city.touched && form.controls.city.invalid">El campo Ciudad es obligatorio.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Estado *</label>
        <input type="text" class="form-control" formControlName="state">
        <div class="error-msg" *ngIf="form.controls.state.touched && form.controls.state.invalid">El campo Estado es obligatorio.</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Unidades Disponibles *</label>
        <input type="number" class="form-control" formControlName="availableUnits">
        <div class="error-msg" *ngIf="form.controls.availableUnits.touched && form.controls.availableUnits.invalid">Mínimo 1 unidad.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Precio ($) *</label>
        <input type="number" class="form-control" formControlName="price">
        <div class="error-msg" *ngIf="form.controls.price.touched && form.controls.price.invalid">Mínimo valor de $10,000.</div>
      </div>
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" formControlName="wifi"> ¿Tiene Wifi?</label>
      <label><input type="checkbox" formControlName="laundry"> ¿Tiene Lavandería?</label>
      <label><input type="checkbox" formControlName="available"> Disponible Ahora</label>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || submitting">Guardar vivienda</button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
    </div>
  </form>
</div>
